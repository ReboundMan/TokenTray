name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build TokenTray.exe
        shell: pwsh
        run: |
          .\build.ps1 -Python "${{ env.pythonLocation }}\python.exe" -Clean

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) { $tag = "v0.0.0-dev" }
          "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Rename artifact
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          Move-Item dist\TokenTray.exe "dist\TokenTray-$v.exe"
          Get-FileHash "dist\TokenTray-$v.exe" -Algorithm SHA256 |
            Select-Object Hash, Path | Format-List | Out-File "dist\TokenTray-$v.exe.sha256.txt"
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTray-${{ steps.ver.outputs.version }}
          path: |
            dist/TokenTray-*.exe
            dist/TokenTray-*.sha256.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TokenTray-*.exe
            dist/TokenTray-*.sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
