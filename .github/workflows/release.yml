name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build TokenTray (onedir + installer)
        shell: pwsh
        run: |
          .\build.ps1 -Python "${{ env.pythonLocation }}\python.exe" -Clean -Installer

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) { $tag = "v0.0.0-dev" }
          "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Package zip + hashes
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $bare = $v.TrimStart("v")
          # Rename installer to match tag (the .iss has its own version string;
          # rename so file matches the tag in the release).
          $existing = Get-ChildItem "dist\TokenTray-Setup-*.exe" | Select-Object -First 1
          if ($existing -and ($existing.Name -ne "TokenTray-Setup-$bare.exe")) {
              Move-Item $existing.FullName "dist\TokenTray-Setup-$bare.exe" -Force
          }
          $zip = "dist\TokenTray-$v-win64.zip"
          Compress-Archive -Path "dist\TokenTray\*" -DestinationPath $zip -Force
          foreach ($f in @("dist\TokenTray-Setup-$bare.exe", $zip)) {
              $h = (Get-FileHash $f -Algorithm SHA256).Hash
              "$h  $(Split-Path $f -Leaf)" | Out-File -Encoding ASCII "$f.sha256.txt"
          }
          Get-ChildItem dist -File

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTray-${{ steps.ver.outputs.version }}
          path: |
            dist/TokenTray-Setup-*.exe
            dist/TokenTray-Setup-*.exe.sha256.txt
            dist/TokenTray-*.zip
            dist/TokenTray-*.zip.sha256.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TokenTray-Setup-*.exe
            dist/TokenTray-Setup-*.exe.sha256.txt
            dist/TokenTray-*.zip
            dist/TokenTray-*.zip.sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
